name: Validate

on:
  push:
  pull_request:

jobs:
  harness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Validate plugin structure
        run: python3 plugins/codex-project-harness/scripts/validate_structure.py plugins/codex-project-harness

      - name: Validate JSON files
        run: |
          python3 -m json.tool plugins/codex-project-harness/.codex-plugin/plugin.json >/dev/null
          find plugins/codex-project-harness/schemas -maxdepth 1 -name '*.json' -print -exec python3 -m json.tool {} \; >/dev/null

      - name: Compile Python
        run: python3 -m py_compile plugins/codex-project-harness/scripts/*.py plugins/codex-project-harness/core/*.py plugins/codex-project-harness/skills/project-runtime/scripts/harness.py tests/test_*.py

      - name: Run runtime tests
        run: python3 -m unittest discover -s tests -p 'test_*.py'

      - name: Run runtime smoke
        run: python3 plugins/codex-project-harness/scripts/run_runtime_smoke.py

      - name: Run forward compatibility wrapper
        run: python3 plugins/codex-project-harness/scripts/run_forward_eval.py

      - name: Run skill eval fixture
        run: python3 plugins/codex-project-harness/scripts/run_skill_eval.py

      - name: Run agent E2E eval fixture
        run: python3 plugins/codex-project-harness/scripts/run_agent_e2e_eval.py --mode fixture

      - name: Run kernel diagnostic smoke
        run: |
          tmp="$(mktemp -d)"
          python3 plugins/codex-project-harness/scripts/harness.py --root "$tmp" init
          python3 plugins/codex-project-harness/scripts/harness.py --root "$tmp" kernel doctor
          python3 plugins/codex-project-harness/scripts/harness.py --root "$tmp" invariant validate
          python3 plugins/codex-project-harness/scripts/harness.py --root "$tmp" projection rebuild

      - name: Check whitespace
        run: git diff --check
