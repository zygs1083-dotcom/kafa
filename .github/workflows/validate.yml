name: Validate

on:
  push:
  pull_request:

jobs:
  harness:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: python3
            python_version: "3.11"
            e2e: stability
          - os: macos-latest
            python: python3
            python_version: "3.12"
            e2e: fixture
          - os: windows-latest
            python: python
            python_version: "3.11"
            e2e: fixture
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python_version }}

      - name: Provide python3 shim on Windows
        if: matrix.os == 'windows-latest'
        run: |
          mkdir -p .ci-bin
          printf '#!/usr/bin/env bash\npython "$@"\n' > .ci-bin/python3
          chmod +x .ci-bin/python3
          echo "$PWD/.ci-bin" >> "$GITHUB_PATH"

      - name: Validate plugin structure
        run: |
          ${{ matrix.python }} -m kafa.release
          ${{ matrix.python }} plugins/codex-project-harness/scripts/validate_structure.py plugins/codex-project-harness

      - name: Validate JSON files
        run: |
          ${{ matrix.python }} -m json.tool plugins/codex-project-harness/.codex-plugin/plugin.json >/dev/null
          ${{ matrix.python }} -m json.tool plugins/codex-project-harness/hooks/hooks.json >/dev/null
          find plugins/codex-project-harness/schemas -maxdepth 1 -name '*.json' -print -exec ${{ matrix.python }} -m json.tool {} \; >/dev/null

      - name: Compile Python
        run: ${{ matrix.python }} -m py_compile kafa/*.py plugins/codex-project-harness/scripts/*.py plugins/codex-project-harness/core/*.py plugins/codex-project-harness/hooks/*.py plugins/codex-project-harness/skills/project-runtime/scripts/harness.py tests/test_*.py

      - name: Install kafa package
        run: ${{ matrix.python }} -m pip install -e .

      - name: Install pinned Codex CLI for plugin smoke
        run: npm install --global "@openai/codex@0.143.0"

      - name: Check kafa package
        run: |
          kafa --version
          kafa plugin install --repo .
          kafa doctor --repo .
          rm -rf .agents

      - name: Isolated user plugin install smoke
        run: ${{ matrix.python }} tests/run_isolated_install_smoke.py --repo .

      - name: Run install release tests
        run: ${{ matrix.python }} -m unittest tests/test_install_release.py

      - name: Run control plane architecture tests
        run: ${{ matrix.python }} -m unittest tests/test_control_plane_architecture.py

      - name: Run runtime tests
        run: ${{ matrix.python }} -m unittest discover -s tests -p 'test_*.py'

      - name: Run runtime smoke
        if: matrix.os == 'ubuntu-latest'
        run: ${{ matrix.python }} plugins/codex-project-harness/scripts/run_runtime_smoke.py

      - name: Run forward compatibility wrapper
        if: matrix.os == 'ubuntu-latest'
        run: ${{ matrix.python }} plugins/codex-project-harness/scripts/run_forward_eval.py

      - name: Run skill eval fixture
        if: matrix.os == 'ubuntu-latest'
        run: ${{ matrix.python }} plugins/codex-project-harness/scripts/run_skill_eval.py

      - name: Run agent E2E eval fixture
        run: ${{ matrix.python }} plugins/codex-project-harness/scripts/run_agent_e2e_eval.py --mode fixture

      - name: Run agent E2E stability matrix
        if: matrix.e2e == 'stability'
        run: ${{ matrix.python }} plugins/codex-project-harness/scripts/run_agent_e2e_eval.py --mode stability

      - name: Run kernel diagnostic smoke
        if: matrix.os == 'ubuntu-latest'
        run: |
          tmp="$(mktemp -d)"
          ${{ matrix.python }} plugins/codex-project-harness/scripts/harness.py --root "$tmp" init
          ${{ matrix.python }} plugins/codex-project-harness/scripts/harness.py --root "$tmp" kernel doctor
          ${{ matrix.python }} plugins/codex-project-harness/scripts/harness.py --root "$tmp" invariant validate
          ${{ matrix.python }} plugins/codex-project-harness/scripts/harness.py --root "$tmp" projection rebuild

      - name: Check whitespace
        run: git diff --check
