name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  scope:
    runs-on: ubuntu-latest
    outputs:
      native_requirement: ${{ steps.classify.outputs.native_requirement }}
      deterministic_gates_required: ${{ steps.classify.outputs.deterministic_gates_required }}
      change_scopes: ${{ steps.classify.outputs.change_scopes }}
      decision_sha256: ${{ steps.classify.outputs.decision_sha256 }}
    steps:
      - name: Checkout tagged source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch published release metadata
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          releases="$RUNNER_TEMP/kafa-published-releases.json"
          if ! curl --fail --location --silent --show-error \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --output "$releases" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases?per_page=100"; then
            printf '[]\n' > "$releases"
          fi

      - name: Classify immutable release comparison
        id: classify
        shell: bash
        run: |
          set -euo pipefail
          head_oid="$(git rev-parse --verify "${GITHUB_SHA}^{commit}")"
          base_oid="$(python -I -S - "$head_oid" "$RUNNER_TEMP/kafa-published-releases.json" <<'PY'
          import json
          import subprocess
          import sys
          from datetime import datetime
          from pathlib import Path

          head_oid, releases_path = sys.argv[1:]
          try:
              releases = json.loads(Path(releases_path).read_text(encoding="utf-8"))
          except (OSError, UnicodeError, json.JSONDecodeError):
              releases = []
          candidates = []
          if isinstance(releases, list):
              for release in releases:
                  if not isinstance(release, dict) or release.get("draft") is not False:
                      continue
                  tag = release.get("tag_name")
                  published_at = release.get("published_at")
                  if not isinstance(tag, str) or not tag or not isinstance(published_at, str):
                      continue
                  try:
                      published = datetime.fromisoformat(published_at.replace("Z", "+00:00"))
                      if published.tzinfo is None:
                          continue
                      base = subprocess.run(
                          ["git", "rev-parse", "--verify", f"refs/tags/{tag}^{{commit}}"],
                          check=True,
                          capture_output=True,
                          text=True,
                      ).stdout.strip()
                      if base == head_oid:
                          continue
                      subprocess.run(
                          ["git", "merge-base", "--is-ancestor", base, head_oid],
                          check=True,
                          capture_output=True,
                      )
                  except (OSError, ValueError, subprocess.SubprocessError):
                      continue
                  candidates.append((published, tag, base))
          candidates.sort(reverse=True)
          print(candidates[0][2] if candidates else "0" * 40)
          PY
          )"
          raw_paths="$RUNNER_TEMP/kafa-change-paths.bin"
          if [[ "$base_oid" == "$(printf '0%.0s' {1..40})" ]]; then
            : > "$raw_paths"
          else
            git diff --no-ext-diff --no-textconv --no-renames --name-only -z \
              --diff-filter=ACDMRTUXB "$base_oid" "$head_oid" -- > "$raw_paths"
          fi
          python -I -S kafa/change_scope.py \
            --repo . \
            --base-oid "$base_oid" \
            --head-oid "$head_oid" \
            > "$RUNNER_TEMP/kafa-change-scope.json"
          python -I -S - "$base_oid" "$head_oid" "$raw_paths" <<'PY'
          import json
          import os
          import sys
          import hashlib
          from pathlib import Path

          sys.path.insert(0, os.getcwd())
          from kafa.change_scope import (
              BLOCKING_NATIVE_PROFILES,
              changed_paths_sha256,
              validate_decision_report,
          )

          base_oid, head_oid, raw_path = sys.argv[1:]
          raw = Path(raw_path).read_bytes()
          if raw and not raw.endswith(b"\0"):
              raise SystemExit("independent Git path inventory is not NUL terminated")
          changed_paths = (
              [part.decode("utf-8", errors="strict") for part in raw[:-1].split(b"\0")]
              if raw
              else []
          )
          report_path = Path(os.environ["RUNNER_TEMP"]) / "kafa-change-scope.json"
          report_bytes = report_path.read_bytes()
          report = json.loads(report_bytes.decode("utf-8"))
          errors = validate_decision_report(
              report,
              expected_base_oid=base_oid,
              expected_head_oid=head_oid,
              expected_changed_paths=changed_paths,
          )
          if errors:
              raise SystemExit("invalid change-scope report: " + "; ".join(errors))
          if report.get("changed_paths_sha256") != changed_paths_sha256(changed_paths):
              raise SystemExit("change-scope path-set digest does not match the independent Git diff")
          requirement = report.get("native_requirement")
          if requirement not in {"blocking", "advisory"}:
              raise SystemExit("invalid Native requirement in change-scope report")
          if report.get("deterministic_gates_required") is not True:
              raise SystemExit("change-scope report attempted to disable deterministic gates")
          self_guard = {
              ".github/workflows/release.yml",
              "kafa/__init__.py",
              "kafa/change_scope.py",
          }
          if base_oid == "0" * 40 or self_guard.intersection(changed_paths):
              requirement = "blocking"
          if requirement == "blocking":
              required_profiles = tuple(report.get("required_profiles", ()))
              if required_profiles != BLOCKING_NATIVE_PROFILES:
                  raise SystemExit("blocking change scope omitted a required Native profile")
          elif report.get("required_profiles") != []:
              raise SystemExit("advisory change scope unexpectedly requires Native profiles")
          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8", newline="\n") as handle:
              handle.write(f"native_requirement={requirement}\n")
              handle.write("deterministic_gates_required=true\n")
              handle.write(f"change_scopes={','.join(report['scopes'])}\n")
              handle.write(f"decision_sha256={hashlib.sha256(report_bytes).hexdigest()}\n")
          evidence_state = "blocking / required" if requirement == "blocking" else "advisory / not-run"
          with Path(os.environ["GITHUB_STEP_SUMMARY"]).open("a", encoding="utf-8", newline="\n") as handle:
              handle.write(f"Real Native evidence: {evidence_state}\n")
          PY

      - name: Preserve change-scope decision
        uses: actions/upload-artifact@v4
        with:
          name: kafa-change-scope-${{ github.sha }}
          path: ${{ runner.temp }}/kafa-change-scope.json
          if-no-files-found: error
          retention-days: 30

  verify:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: python3
            python_version: "3.11"
            extended: true
          - os: macos-latest
            python: python3
            python_version: "3.12"
            extended: false
          - os: windows-latest
            python: python
            python_version: "3.11"
            extended: false
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout tagged source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python_version }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Provide python3 shim on Windows
        if: matrix.os == 'windows-latest'
        run: |
          mkdir -p .ci-bin
          printf '#!/usr/bin/env bash\npython "$@"\n' > .ci-bin/python3
          chmod +x .ci-bin/python3
          echo "$PWD/.ci-bin" >> "$GITHUB_PATH"

      - name: Install pinned Codex CLI
        run: |
          codex_version="$(${{ matrix.python }} -c 'import json; print(json.load(open("release.json"))["codex_cli_smoke_version"])')"
          npm install --global "@openai/codex@$codex_version"

      - name: Validate tagged release source
        run: |
          ${{ matrix.python }} -m kafa.release --require-tag
          ${{ matrix.python }} plugins/codex-project-harness/scripts/validate_structure.py plugins/codex-project-harness
          ${{ matrix.python }} -m py_compile kafa/*.py plugins/codex-project-harness/scripts/*.py plugins/codex-project-harness/core/*.py plugins/codex-project-harness/hooks/*.py plugins/codex-project-harness/skills/project-harness/scripts/harness.py tests/test_*.py tests/run_isolated_install_smoke.py

      - name: Run unit regression gate
        run: ${{ matrix.python }} -W error::ResourceWarning -m unittest discover -s tests -p 'test_*.py'

      - name: Run real isolated install smoke
        run: ${{ matrix.python }} tests/run_isolated_install_smoke.py --repo .

      - name: Run extended runtime and eval gate
        if: matrix.extended
        run: |
          ${{ matrix.python }} plugins/codex-project-harness/scripts/run_runtime_smoke.py
          ${{ matrix.python }} plugins/codex-project-harness/scripts/run_skill_eval.py
          ${{ matrix.python }} plugins/codex-project-harness/scripts/run_agent_e2e_eval.py --mode fixture
          ${{ matrix.python }} plugins/codex-project-harness/scripts/run_agent_e2e_eval.py --mode stability

  real_host_compatibility:
    name: Real Codex host compatibility
    needs: scope
    if: needs.scope.outputs.native_requirement == 'blocking'
    strategy:
      fail-fast: false
      matrix:
        profile: [live-codex, live-codex-parallel]
    runs-on: [self-hosted, kafa-codex-live]
    environment: codex-live-release
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout tagged source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Download exact change-scope decision
        uses: actions/download-artifact@v4
        with:
          name: kafa-change-scope-${{ github.sha }}
          path: ${{ runner.temp }}/kafa-change-scope

      - name: Install pinned Codex CLI for the live profile
        run: |
          codex_version="$(python -c 'import json; print(json.load(open("release.json"))["codex_cli_smoke_version"])')"
          npm install --prefix "$RUNNER_TEMP/kafa-codex-cli" "@openai/codex@$codex_version"
          echo "$RUNNER_TEMP/kafa-codex-cli/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Validate tagged source and authenticated host
        run: |
          python -m kafa.release --require-tag
          codex --version
          codex login status

      - name: Run real Codex single profile
        if: matrix.profile == 'live-codex'
        env:
          HARNESS_E2E_ENABLE_LIVE_CODEX: "1"
          HARNESS_E2E_LIVE_TIMEOUT: "900"
        run: >-
          python plugins/codex-project-harness/scripts/run_agent_e2e_eval.py
          --mode live-codex
          --out "$RUNNER_TEMP/kafa-live-codex-diagnostic.json"
          --evidence-out "$RUNNER_TEMP/kafa-live-codex-report.json"

      - name: Run real Codex parallel profile
        if: matrix.profile == 'live-codex-parallel'
        env:
          HARNESS_E2E_ENABLE_LIVE_CODEX_PARALLEL: "1"
          HARNESS_E2E_LIVE_TIMEOUT: "900"
        run: >-
          python plugins/codex-project-harness/scripts/run_agent_e2e_eval.py
          --mode live-codex-parallel
          --out "$RUNNER_TEMP/kafa-live-codex-parallel-diagnostic.json"
          --evidence-out "$RUNNER_TEMP/kafa-live-codex-parallel-report.json"

      - name: Create stable evidence summary
        if: always()
        run: |
          python -m kafa.evidence_summary native \
            --detail "$RUNNER_TEMP/kafa-${{ matrix.profile }}-report.json" \
            --out "$RUNNER_TEMP/kafa-${{ matrix.profile }}-summary.json" \
            --change-scope-report "$RUNNER_TEMP/kafa-change-scope/kafa-change-scope.json" \
            --expected-decision-sha256 "${{ needs.scope.outputs.decision_sha256 }}" \
            --eligibility current-eligible \
            --validator-repo "$GITHUB_WORKSPACE" \
            --retention-class ci-artifact \
            --retention-locator "real-codex-host-compatibility-${{ matrix.profile }}" \
            --retention-days 30
          python -m kafa.evidence_summary verify \
            --summary "$RUNNER_TEMP/kafa-${{ matrix.profile }}-summary.json" \
            --detail "$RUNNER_TEMP/kafa-${{ matrix.profile }}-report.json" \
            --change-scope-report "$RUNNER_TEMP/kafa-change-scope/kafa-change-scope.json" \
            --expected-decision-sha256 "${{ needs.scope.outputs.decision_sha256 }}" \
            --eligibility current-eligible \
            --validator-repo "$GITHUB_WORKSPACE"
          {
            echo '### Stable Native evidence summary'
            echo '```json'
            cat "$RUNNER_TEMP/kafa-${{ matrix.profile }}-summary.json"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Preserve real-host compatibility evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: real-codex-host-compatibility-${{ matrix.profile }}
          path: |
            ${{ runner.temp }}/kafa-${{ matrix.profile }}-report.json
            ${{ runner.temp }}/kafa-${{ matrix.profile }}-summary.json
            ${{ runner.temp }}/kafa-${{ matrix.profile }}-diagnostic.json
          if-no-files-found: error
          retention-days: 30

  candidate:
    needs:
      - scope
      - verify
      - real_host_compatibility
    if: >-
      always() &&
      needs.scope.result == 'success' &&
      needs.verify.result == 'success' &&
      (needs.scope.outputs.native_requirement == 'advisory' ||
       needs.real_host_compatibility.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    env:
      RELEASE_CANDIDATE_DIR: ${{ github.workspace }}/../release-candidate
    steps:
      - name: Checkout tagged source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pinned build and Codex tooling
        run: |
          python -m pip install build==1.5.0 setuptools==83.0.0
          codex_version="$(python -c 'import json; print(json.load(open("release.json"))["codex_cli_smoke_version"])')"
          npm install --global "@openai/codex@$codex_version"

      - name: Resolve checksum-pinned Syft asset
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          tooling = json.loads(Path("release-tooling.json").read_text(encoding="utf-8"))
          item = tooling["sbom"]["downloads"]["linux-amd64"]
          version = tooling["sbom"]["version"]
          values = {
              "SYFT_ARCHIVE": item["filename"],
              "SYFT_SHA256": item["sha256"],
              "SYFT_URL": (
                  "https://github.com/anchore/syft/releases/download/"
                  f"v{version}/{item['filename']}"
              ),
              "SYFT_BIN": str(Path(os.environ["RUNNER_TEMP"]) / "syft-bin" / "syft"),
          }
          with Path(os.environ["GITHUB_ENV"]).open("a", encoding="utf-8", newline="\n") as handle:
              for key, value in values.items():
                  handle.write(f"{key}={value}\n")
          PY

      - name: Download checksum-pinned Syft
        run: |
          mkdir -p "$RUNNER_TEMP/syft-bin"
          curl --fail --location --silent --show-error \
            --output "$RUNNER_TEMP/$SYFT_ARCHIVE" "$SYFT_URL"
          printf '%s  %s\n' "$SYFT_SHA256" "$RUNNER_TEMP/$SYFT_ARCHIVE" | sha256sum --check --strict
          tar -xzf "$RUNNER_TEMP/$SYFT_ARCHIVE" -C "$RUNNER_TEMP/syft-bin" syft
          chmod 0755 "$RUNNER_TEMP/syft-bin/syft"
          "$RUNNER_TEMP/syft-bin/syft" version -o json

      - name: Validate tag and build exact wheel and sdist once
        run: |
          python -m kafa.release --require-tag
          mkdir -p "$RELEASE_CANDIDATE_DIR"
          python -m build --no-isolation --wheel --sdist --outdir "$RELEASE_CANDIDATE_DIR"
          pep440="$(python -c 'import json; print(json.load(open("release.json"))["pep440_version"])')"
          wheel="$RELEASE_CANDIDATE_DIR/kafa-${pep440}-py3-none-any.whl"
          sdist="$RELEASE_CANDIDATE_DIR/kafa-${pep440}.tar.gz"
          {
            printf 'WHEEL=%s\n' "$wheel"
            printf 'SDIST=%s\n' "$sdist"
            printf 'WHEEL_SBOM=%s.cdx.json\n' "$wheel"
            printf 'SDIST_SBOM=%s.cdx.json\n' "$sdist"
          } >> "$GITHUB_ENV"

      - name: Generate and verify local SBOM and provenance evidence
        run: |
          python -m kafa.supply_chain generate \
            --repo "$GITHUB_WORKSPACE" \
            --dist "$RELEASE_CANDIDATE_DIR" \
            --syft "$SYFT_BIN"
          python -m kafa.supply_chain verify \
            --repo "$GITHUB_WORKSPACE" \
            --dist "$RELEASE_CANDIDATE_DIR"

      - name: Smoke exact release artifacts in isolated HOME and venv
        run: |
          python tests/run_isolated_install_smoke.py \
            --repo . \
            --codex-bin "$(command -v codex)" \
            --wheel "$WHEEL" \
            --source-archive "$SDIST" \
            --json

      - name: Reverify artifact bytes after isolated install
        run: |
          python -m kafa.supply_chain verify \
            --repo "$GITHUB_WORKSPACE" \
            --dist "$RELEASE_CANDIDATE_DIR"

      - name: Prepare exact release notes
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          from kafa.release import changelog_section

          manifest = json.loads(Path("release.json").read_text(encoding="utf-8"))
          section = changelog_section(Path("CHANGELOG.md").read_text(encoding="utf-8"), manifest["tag"])
          target = Path(os.environ["RELEASE_CANDIDATE_DIR"]) / "release-notes.md"
          target.write_text(section.split("\n", 1)[1].strip() + "\n", encoding="utf-8", newline="\n")
          PY

      - name: Generate GitHub build provenance
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6
        with:
          subject-checksums: ${{ env.RELEASE_CANDIDATE_DIR }}/SHA256SUMS

      - name: Generate GitHub wheel SBOM attestation
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6
        with:
          subject-path: ${{ env.WHEEL }}
          sbom-path: ${{ env.WHEEL_SBOM }}

      - name: Generate GitHub sdist SBOM attestation
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6
        with:
          subject-path: ${{ env.SDIST }}
          sbom-path: ${{ env.SDIST_SBOM }}

      - name: Preserve exact attested candidate
        uses: actions/upload-artifact@v4
        with:
          name: kafa-release-candidate-${{ github.sha }}
          path: ${{ env.RELEASE_CANDIDATE_DIR }}
          if-no-files-found: error
          retention-days: 30

  publish:
    needs:
      - candidate
    runs-on: ubuntu-latest
    permissions:
      contents: write
      attestations: read
    env:
      RELEASE_CANDIDATE_DIR: ${{ github.workspace }}/../release-candidate
    steps:
      - name: Checkout exact tagged source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download exact attested candidate
        uses: actions/download-artifact@v4
        with:
          name: kafa-release-candidate-${{ github.sha }}
          path: ${{ env.RELEASE_CANDIDATE_DIR }}

      - name: Revalidate tag and candidate bytes
        run: |
          python -m kafa.release --require-tag
          python -m kafa.supply_chain verify \
            --repo "$GITHUB_WORKSPACE" \
            --dist "$RELEASE_CANDIDATE_DIR"
          pep440="$(python -c 'import json; print(json.load(open("release.json"))["pep440_version"])')"
          wheel="$RELEASE_CANDIDATE_DIR/kafa-${pep440}-py3-none-any.whl"
          sdist="$RELEASE_CANDIDATE_DIR/kafa-${pep440}.tar.gz"
          {
            printf 'WHEEL=%s\n' "$wheel"
            printf 'SDIST=%s\n' "$sdist"
            printf 'WHEEL_SBOM=%s.cdx.json\n' "$wheel"
            printf 'SDIST_SBOM=%s.cdx.json\n' "$sdist"
          } >> "$GITHUB_ENV"

      - name: Verify GitHub provenance and SBOM attestations
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for artifact in "$WHEEL" "$SDIST"; do
            gh attestation verify "$artifact" \
              --repo "$GITHUB_REPOSITORY" \
              --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/release.yml" \
              --signer-digest "$GITHUB_SHA" \
              --source-digest "$GITHUB_SHA" \
              --source-ref "$GITHUB_REF" \
              --predicate-type https://slsa.dev/provenance/v1
            gh attestation verify "$artifact" \
              --repo "$GITHUB_REPOSITORY" \
              --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/release.yml" \
              --signer-digest "$GITHUB_SHA" \
              --source-digest "$GITHUB_SHA" \
              --source-ref "$GITHUB_REF" \
              --predicate-type https://cyclonedx.org/bom
          done

      - name: Final local verification before publication
        run: |
          python -m kafa.supply_chain verify \
            --repo "$GITHUB_WORKSPACE" \
            --dist "$RELEASE_CANDIDATE_DIR"

      - name: Publish GitHub prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "$WHEEL" \
            "$SDIST" \
            "$WHEEL_SBOM" \
            "$SDIST_SBOM" \
            "$RELEASE_CANDIDATE_DIR/SHA256SUMS" \
            "$RELEASE_CANDIDATE_DIR/kafa-build-provenance.intoto.json" \
            "$RELEASE_CANDIDATE_DIR/kafa-supply-chain-manifest.json" \
            --verify-tag \
            --prerelease \
            --title "$GITHUB_REF_NAME" \
            --notes-file "$RELEASE_CANDIDATE_DIR/release-notes.md"
